<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="shortcut icon" href="./assets/cafefavi-removebg-preview.png" type="image/x-icon">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <title>New Tab</title>
</head>

<body>

<div class="page-wrapper">

    <div class="left-container">

        <div id="date" class="date-display"></div>

        <div id="time" class="time-display"></div>

        <div id="greeting"></div>

        <div id="user-name">
            <h2>What's Your name?</h2>

            <input
                type="text"
                placeholder="Jane"
                id="name-input">

            <button id="name-save">Save</button>
        </div>

       <div class="search-bar">

    <form id="search" action="https://www.google.com/search" method="get">

        <div class="search-input-wrapper">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>

            <input type="search" name="q" placeholder="Search Google">
        </div>


    </form>

</div>
        <div class="to-do">

            <h3>Whats on your mind?</h3>

            <div class="tasks">

                <div class="form">

                    <form>
                        <input type="text" class="todo-input" maxlength="40" placeholder="">

                        <button class="toDO-btn" type="submit"> Add Task </button>

                    </form>

                </div>

                <ul class="todo-list">

                    <button class="refreshlist" type="reset"> Reset List</button>

                </ul>

            </div>

        </div>

    </div>

    <div class="right-container">

        <div class="calendar-header">

            <span class="agenda-icon">

                <img src="./assets/google-calendar.png">

            </span>

            <h3>Today's Agenda</h3>

            <button
                class="add-btn"
                id="show-event-form-btn">

                +

            </button>

        </div>

        <form
            id="event-form"
            class="event-form"
            style="display:none;">

            <input
                type="text"
                id="event-title"
                placeholder="Event title"
                required>

            <input
                type="date"
                id="event-date"
                required>

            <input
                type="time"
                id="event-time"
                required>

            <button type="submit">

                Add Event

            </button>

        </form>

        <div
            id="calendar-events"
            class="calendar-events">

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="./JS/calender.js"></script>
<script src="./JS/toDo.js"></script>
<script src="./JS/dateTime.js"></script>
<script src="./JS/name.js"></script>

</body>
</html>
